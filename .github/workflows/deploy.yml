name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 规避 npm optional deps bug（rollup 平台二进制在 lockfile 中缺失）
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund

      # 如果部署到 https://<user>.github.io/<repo>/，把 BASE 改成 /<repo>/
      # 如果是自定义域名或用户站（<user>.github.io 仓库），保持 "/"
      - run: npm run build
        env:
          BASE: ${{ vars.BASE_PATH || '/' }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
